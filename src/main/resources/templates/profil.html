<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profilim - Gazze Haber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body{background-color:#f8f9fa;}</style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>
            <span class="text-white">Profilim</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm text-center p-4 mb-4">
                    <div class="display-1 text-secondary mb-3"><i class="fas fa-user-circle"></i></div>
                    <h3 th:text="${kullanici.ad + ' ' + kullanici.soyad}">Ad Soyad</h3>
                    <p class="text-muted" th:text="${kullanici.email}">email@mail.com</p>
                    <div class="badge bg-danger" th:text="${kullanici.rol}">ROL</div>
                    <hr>
                    <form action="/logout" method="post">
                        <button class="btn btn-outline-danger w-100">Çıkış Yap</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <h4 class="mb-3"><i class="fas fa-bookmark text-danger"></i> Kaydettiklerim</h4>
                
                <div th:if="${kaydedilenler.empty}" class="alert alert-warning">
                    Henüz hiç haber kaydetmedin.
                </div>

                <div class="list-group shadow-sm">
                    <a th:each="kayit : ${kaydedilenler}" 
                       th:href="@{/haber/{id}(id=${kayit.haber.id})}" 
                       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
                        
                        <div class="d-flex align-items-center">
                            <img th:src="${kayit.haber.gorselUrl}" class="rounded me-3" width="60" height="40" style="object-fit: cover;">
                            <div>
                                <h6 class="mb-0 fw-bold" th:text="${kayit.haber.baslik}">Haber Başlığı</h6>
                                <small class="text-muted" th:text="${#temporals.format(kayit.kayitTarihi, 'dd.MM.yyyy HH:mm')}">Tarih</small>
                            </div>
                        </div>
                        
                        <i class="fas fa-chevron-right text-muted"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
