<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - Gazze Haber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .btn-custom {
            background-color: #e74c3c;
            color: white;
            width: 100%;
            padding: 10px;
            font-weight: bold;
            border: none;
        }
        .btn-custom:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center mb-4">Giriş Yap</h3>

        <div th:if="${param.error}" class="alert alert-danger text-center">
            E-Posta veya şifre hatalı!
        </div>

        <div th:if="${param.logout}" class="alert alert-success text-center">
            Başarıyla çıkış yapıldı.
        </div>

        <div th:if="${param.success}" class="alert alert-success text-center">
            Kayıt başarılı! Şimdi giriş yapabilirsin.
        </div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">E-Posta Adresi</label>
                <input type="email" name="username" class="form-control" placeholder="ornek@email.com" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Şifre</label>
                <input type="password" name="password" class="form-control" placeholder="****" required>
            </div>
            <button type="submit" class="btn btn-custom mt-2">Giriş Yap</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-muted text-decoration-none small">← Siteye Geri Dön</a>
        </div>
        
        <div class="text-center mt-3 pt-3 border-top">
            <span>Hesabın yok mu?</span><br>
            <a href="/kayit" class="text-danger fw-bold text-decoration-none">Hemen Kayıt Ol</a>
        </div>
    </div>

</body>
</html>
