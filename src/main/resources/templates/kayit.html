<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Gazze Haber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; color: #333; max-width: 400px; width: 100%; }
    </style>
</head>
<body>
    <div class="card p-4 rounded shadow">
        <h3 class="text-center mb-3">Aramıza Katıl</h3>
        
        <div th:if="${param.error}" class="alert alert-danger">Bu e-posta zaten kullanılıyor!</div>

        <form action="/kayit-ol" method="post">
            <div class="mb-3"><input type="text" name="ad" class="form-control" placeholder="Adınız" required></div>
            <div class="mb-3"><input type="text" name="soyad" class="form-control" placeholder="Soyadınız" required></div>
            <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="E-Posta" required></div>
            <div class="mb-3"><input type="password" name="sifre" class="form-control" placeholder="Şifre" required></div>
            
            <button type="submit" class="btn btn-danger w-100">Kayıt Ol</button>
        </form>
        <div class="text-center mt-3">
            <a href="/login">Zaten hesabın var mı? Giriş Yap</a>
        </div>
    </div>
</body>
</html>
