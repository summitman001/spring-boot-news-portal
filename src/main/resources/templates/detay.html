<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${haber.baslik}">Haber Detayı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #1a1a1a !important; }
        .haber-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 100px;
            margin-bottom: 50px;
        }
        .haber-baslik { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        .haber-meta { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .haber-icerik { font-size: 1.2rem; line-height: 1.8; color: #34495e; white-space: pre-wrap; }
        .hover-effect:hover { background-color: #dc3545 !important; transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-arrow-left"></i> Ana Sayfaya Dön</a>
        </div>
    </nav>

    <div class="container">
        <div class="haber-container">

            <div class="mb-2">
                <a th:if="${haber.kategori != null}" 
                   th:href="@{/kategori/{id}(id=${haber.kategori.id})}"
                   class="badge bg-danger text-decoration-none" 
                   style="font-size: 1rem;" 
                   th:text="${haber.kategori.ad}">
                    Kategori
                </a>
            </div>

            <h1 class="haber-baslik" th:text="${haber.baslik}">Haber Başlığı</h1>

            <div class="haber-meta mt-3">
                <i class="far fa-calendar-alt"></i> <span th:text="${#temporals.format(haber.yayinTarihi, 'dd MMMM yyyy HH:mm')}"></span>
                &nbsp;|&nbsp; 
                <i class="fas fa-eye"></i> <span th:text="${haber.goruntulenmeSayisi}">0</span> Görüntülenme
                &nbsp;|&nbsp; 
                <i class="fas fa-link"></i> 
                <span th:if="${haber.kaynak != null}">
                    Kaynak: <a th:href="${haber.kaynak.url}" target="_blank" class="text-decoration-none fw-bold text-danger" th:text="${haber.kaynak.ad}">TRT</a>
                </span>
            </div>

            <div class="mb-4 text-center">
                <img th:if="${haber.gorselUrl != null}" th:src="${haber.gorselUrl}" class="img-fluid rounded shadow" style="max-height: 500px; width: 100%; object-fit: cover;">
            </div>

            <div class="d-flex justify-content-end mb-3 border-bottom pb-3">
                
                <a th:if="${#authorization.expression('isAnonymous()')}" href="/login" class="btn btn-outline-danger btn-sm me-2">
                    <i class="far fa-heart"></i> <span th:text="${begeniSayisi}">0</span>
                </a>

                <form th:if="${#authorization.expression('isAuthenticated()')}" action="/haber-begen" method="post" class="me-2">
                    <input type="hidden" name="haberId" th:value="${haber.id}">
                    <button type="submit" class="btn btn-sm" th:classappend="${begendiMi} ? 'btn-danger' : 'btn-outline-danger'">
                        <i th:class="${begendiMi} ? 'fas fa-heart' : 'far fa-heart'"></i>
                        <span th:text="${begeniSayisi}">0</span>
                    </button>
                </form>

                <a th:if="${#authorization.expression('isAnonymous()')}" href="/login" class="btn btn-outline-dark btn-sm">
                    <i class="far fa-bookmark"></i> Kaydet
                </a>

                <form th:if="${#authorization.expression('isAuthenticated()')}" action="/haber-kaydet" method="post">
                    <input type="hidden" name="haberId" th:value="${haber.id}">
                    <button type="submit" class="btn btn-sm" th:classappend="${kaydedildiMi} ? 'btn-dark' : 'btn-outline-dark'">
                        <i th:class="${kaydedildiMi} ? 'fas fa-bookmark' : 'far fa-bookmark'"></i>
                        <span th:text="${kaydedildiMi} ? 'Kaydedildi' : 'Kaydet'"></span>
                    </button>
                </form>
            </div>

            <div class="d-flex justify-content-start mb-4 gap-2">
                <span class="text-muted align-self-center small me-2">Tepkiniz:</span>

                <form action="/tepki-ver" method="post" th:if="${#authorization.expression('isAuthenticated()')}">
                    <input type="hidden" name="haberId" th:value="${haber.id}">
                    <input type="hidden" name="tur" value="ALEV">
                    <button type="submit" class="btn btn-sm rounded-pill" 
                            th:classappend="${kullaniciTepkisi == 'ALEV'} ? 'btn-warning' : 'btn-light border'">
                        🔥 <span th:text="${alevSayisi}" class="fw-bold small">0</span>
                    </button>
                </form>

                <form action="/tepki-ver" method="post" th:if="${#authorization.expression('isAuthenticated()')}">
                    <input type="hidden" name="haberId" th:value="${haber.id}">
                    <input type="hidden" name="tur" value="ALKIS">
                    <button type="submit" class="btn btn-sm rounded-pill" 
                            th:classappend="${kullaniciTepkisi == 'ALKIS'} ? 'btn-success' : 'btn-light border'">
                        👏 <span th:text="${alkisSayisi}" class="fw-bold small">0</span>
                    </button>
                </form>

                <form action="/tepki-ver" method="post" th:if="${#authorization.expression('isAuthenticated()')}">
                    <input type="hidden" name="haberId" th:value="${haber.id}">
                    <input type="hidden" name="tur" value="UZGUN">
                    <button type="submit" class="btn btn-sm rounded-pill" 
                            th:classappend="${kullaniciTepkisi == 'UZGUN'} ? 'btn-info' : 'btn-light border'">
                        😢 <span th:text="${uzgunSayisi}" class="fw-bold small">0</span>
                    </button>
                </form>

                <form action="/tepki-ver" method="post" th:if="${#authorization.expression('isAuthenticated()')}">
                    <input type="hidden" name="haberId" th:value="${haber.id}">
                    <input type="hidden" name="tur" value="KIZGIN">
                    <button type="submit" class="btn btn-sm rounded-pill" 
                            th:classappend="${kullaniciTepkisi == 'KIZGIN'} ? 'btn-danger' : 'btn-light border'">
                        😡 <span th:text="${kizginSayisi}" class="fw-bold small">0</span>
                    </button>
                </form>
                
                <a th:if="${#authorization.expression('isAnonymous()')}" href="/login" class="btn btn-light border btn-sm rounded-pill text-muted small">
                    Tepki vermek için giriş yapınız
                </a>
            </div>

            <div class="haber-icerik">
                <p th:text="${haber.icerik}">Haber içeriği...</p>
            </div>

            <div class="mt-4 mb-4">
                <i class="fas fa-tags text-danger me-2"></i>
                <span th:if="${haber.etiketler.empty}" class="text-muted small">Etiket yok</span>
                <span th:each="etiket : ${haber.etiketler}">
                    <a th:href="@{/etiket/{id}(id=${etiket.id})}" 
                       class="badge rounded-pill bg-dark text-white text-decoration-none me-1 hover-effect border border-secondary">
                        #<span th:text="${etiket.ad}">Etiket</span>
                    </a>
                </span>
            </div>

            <hr class="my-5">

            <div class="card bg-light mb-4 border-0">
                <div class="card-body p-4">
                    <h4 class="mb-4">Bir Yorum Bırak</h4>
                    <form action="/yorum-yap" method="post">
                        <input type="hidden" name="haberId" th:value="${haber.id}">
                        <div class="mb-3">
                            <input type="text" name="adSoyad" class="form-control" placeholder="Adınız Soyadınız" required>
                        </div>
                        <div class="mb-3">
                            <textarea name="icerik" class="form-control" rows="3" placeholder="Yorumunuz..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger">Yorumu Gönder</button>
                    </form>
                </div>
            </div>

            <h4 class="mb-3"><i class="far fa-comments"></i> Yorumlar (<span th:text="${haber.yorumlar.size()}">0</span>)</h4>

            <div th:if="${haber.yorumlar.empty}" class="alert alert-secondary">
                Henüz yorum yapılmamış. İlk yorumu sen yap!
            </div>

            <div th:each="yorum : ${haber.yorumlar}" class="card mb-3 border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <h6 class="fw-bold text-danger" th:text="${yorum.adSoyad}">Kullanıcı</h6>
                        <small class="text-muted" th:text="${#temporals.format(yorum.tarih, 'dd.MM.yyyy HH:mm')}">Tarih</small>
                    </div>
                    <p class="card-text mt-2" th:text="${yorum.icerik}">Yorum içeriği...</p>
                </div>
            </div>

            <div class="mt-5 text-center">
                <a href="/" class="btn btn-outline-danger px-5">Kapat ve Geri Dön</a>
            </div>

        </div>
    </div>

</body>
</html>
